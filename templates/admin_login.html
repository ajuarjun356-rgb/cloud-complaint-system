<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
}

.card{
border-radius:15px;
}
</style>

</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow border-0" style="width:400px">

<h3 class="text-center mb-4 fw-bold">Admin Login</h3>

<form method="POST">

<div class="mb-3">
<label class="form-label fw-bold">Email</label>
<input type="email" name="email" class="form-control" required>
</div>

<div class="mb-1">
<label class="form-label fw-bold">Password</label>
<input type="password" name="password" class="form-control" required>
</div>

{% if error %}
<p class="text-danger small mt-1">{{ error }}</p>
{% endif %}

<div class="d-grid mt-3">
<button type="submit"
class="btn text-white fw-bold"
style="background: linear-gradient(to right,#667eea,#764ba2); border:none;">
Login
</button>
</div>

</form>

</div>

</div>

</body>
</html>
