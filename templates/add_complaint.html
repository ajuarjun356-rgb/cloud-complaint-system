<!DOCTYPE html>
<html>
<head>
    <title>Add Complaint</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }
    </style>
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow border-0" style="width: 500px; border-radius: 15px;">
        <h4 class="mb-4 fw-bold text-center">Register New Complaint</h4>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Subject</label>
                <input type="text" name="subject" class="form-control" placeholder="Brief title (e.g. Water Leak)" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Description</label>
                <textarea class="form-control" 
                          name="description" 
                          placeholder="Describe your issue in detail..." 
                          rows="4" 
                          required></textarea>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn text-white fw-bold shadow-sm" 
                        style="background: linear-gradient(to right, #667eea, #764ba2); border: none;">
                    Submit Complaint
                </button>
                <a href="/dashboard" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
