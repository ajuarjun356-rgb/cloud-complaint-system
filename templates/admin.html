<!DOCTYPE html>
<html>
<head>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Admin Panel</title>
</head>
<body>

<h1>Admin – Complaint Management</h1>

<table border="1" cellpadding="8">
    <tr>
        <th>ID</th>
        <th>Email</th>
        <th>Complaint</th>
        <th>Status</th>
        <th>Action</th>
    </tr>

    {% for c in complaints %}
    <tr>
        <td>{{ c[0] }}</td>
        <td>{{ c[1] }}</td>
        <td>{{ c[2] }}</td>
        <td>{{ c[3] }}</td>
        <td>
            <a href="/resolve/{{ c[0] }}">Mark as Resolved</a>
        </td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="/">Home</a>

</body>
</html>
